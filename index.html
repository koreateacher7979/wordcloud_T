<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>함께 만드는 생각 구름 - 실시간 워드클라우드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f8fafc;
        }
        #word-cloud-container {
            width: 100%;
            height: 600px;
            position: relative;
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .gradient-text {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #10b981;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header Section -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <p class="text-sm font-semibold text-gray-500 mb-1">개발자: 가치있는 미래교육 연구소 대표 김병찬</p>
                <h1 class="text-3xl md:text-4xl font-extrabold gradient-text">함께 만드는 생각 구름</h1>
                <div class="flex items-center mt-2 text-sm text-gray-400">
                    <span class="status-dot"></span>
                    <span id="update-status">데이터를 실시간으로 모으는 중...</span>
                </div>
            </div>
            
            <button id="capture-btn" class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-bold transition-all transform hover:scale-105 active:scale-95 shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                우리의 생각 저장하기
            </button>
        </header>

        <!-- Main Display Area -->
        <div id="capture-area" class="p-4 bg-white rounded-[2rem] border border-gray-100 shadow-sm">
            <div id="word-cloud-container">
                <canvas id="word-cloud-canvas"></canvas>
            </div>
        </div>

        <!-- Info Footer -->
        <footer class="mt-6 flex justify-between items-center text-xs text-gray-400 px-2">
            <p>* 구글 시트(A~E열)의 단어들이 모여 실시간으로 구름을 만듭니다.</p>
            <p id="last-updated">마지막 동기화: -</p>
        </footer>
    </div>

    <script>
        const SPREADSHEET_ID = '196JtxNZSUe3EEc3VP-EN6c-B3IoUlEifxs3-mSH-Z7g';
        const SHEET_NAME = 'Sheet1'; 
        const API_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${SHEET_NAME}`;

        const canvas = document.getElementById('word-cloud-canvas');
        const container = document.getElementById('word-cloud-container');
        const updateStatus = document.getElementById('update-status');
        const lastUpdatedText = document.getElementById('last-updated');

        function resizeCanvas() {
            canvas.width = container.offsetWidth;
            canvas.height = container.offsetHeight;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                const csvText = await response.text();
                processData(csvText);
                
                const now = new Date();
                lastUpdatedText.innerText = `마지막 동기화: ${now.toLocaleTimeString()}`;
                updateStatus.innerText = '실시간 스트리밍 중 (10초 간격)';
            } catch (error) {
                console.error('데이터 로드 실패:', error);
                updateStatus.innerText = '연결 오류 - 시트 권한을 확인하세요';
            }
        }

        function processData(csvText) {
            const rows = csvText.split('\n').map(row => {
                return row.split(',').map(cell => cell.replace(/^"(.*)"$/, '$1').trim());
            });

            const wordCounts = {};

            rows.forEach((row, index) => {
                if (index === 0 && row[0] === "Timestamp") return; 

                for (let i = 0; i < 5; i++) {
                    if (row[i]) {
                        const word = row[i];
                        if (word.length > 0) {
                            wordCounts[word] = (wordCounts[word] || 0) + 1;
                        }
                    }
                }
            });

            const list = Object.entries(wordCounts).map(([word, count]) => [word, count]);
            list.sort((a, b) => b[1] - a[1]);
            renderWordCloud(list);
        }

        function renderWordCloud(list) {
            if (list.length === 0) return;

            const maxCount = list[0][1];

            WordCloud(canvas, {
                list: list,
                gridSize: Math.round(16 * canvas.width / 1024),
                weightFactor: function (size) {
                    return Math.pow(size, 0.7) * (canvas.width / 20);
                },
                fontFamily: 'Pretendard, sans-serif',
                color: function () {
                    const colors = ['#4f46e5', '#7c3aed', '#db2777', '#2563eb', '#0891b2', '#059669'];
                    return colors[Math.floor(Math.random() * colors.length)];
                },
                rotateRatio: 0.3,
                rotationSteps: 2,
                backgroundColor: '#ffffff',
                minSize: 10,
                drawOutOfBound: false,
                shrinkToFit: true
            });
        }

        document.getElementById('capture-btn').addEventListener('click', () => {
            const btn = document.getElementById('capture-btn');
            const originalText = btn.innerHTML;
            
            btn.innerText = "저장 중...";
            btn.disabled = true;

            html2canvas(document.getElementById('capture-area'), {
                backgroundColor: '#ffffff',
                scale: 2 
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `함께만든생각구름_${new Date().getTime()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                btn.innerHTML = originalText;
                btn.disabled = false;
            });
        });

        fetchData();
        setInterval(fetchData, 10000);
    </script>
</body>
</html>
